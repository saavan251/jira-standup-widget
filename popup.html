<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jira Standup Picker</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div id="app">

    <!-- Header -->
    <header class="header">
      <span class="header-icon">🎲</span>
      <h1 class="header-title">Sprint Picker</h1>
    </header>

    <!-- Loading state -->
    <div id="state-loading" class="state">
      <div class="spinner" aria-label="Loading assignees"></div>
      <p class="state-text">Reading board...</p>
    </div>

    <!-- Error state -->
    <div id="state-error" class="state" hidden>
      <p class="state-icon">⚠️</p>
      <p class="state-text error-text" id="error-message">Something went wrong.</p>
    </div>

    <!-- Main content -->
    <div id="state-main" class="state" hidden>

      <section aria-labelledby="checklist-label">
        <div class="checklist-header">
          <span id="checklist-label" class="section-label">Who's in?</span>
          <div class="checklist-controls">
            <button id="btn-all" class="link-btn" type="button">All</button>
            <span class="divider">|</span>
            <button id="btn-none" class="link-btn" type="button">None</button>
          </div>
        </div>
        <p id="remaining-count" class="remaining-count" hidden></p>
        <ul id="assignee-list" class="assignee-list" role="list"></ul>

        <!-- Custom name input -->
        <div class="custom-name-input-group">
          <input id="custom-name-input" type="text" placeholder="Add custom name" class="custom-name-input" />
          <button id="btn-add-custom" class="btn-add-custom" type="button">Add</button>
        </div>
      </section>

      <!-- Result (shown after pick) -->
      <div id="result-area" class="result-area" hidden aria-live="polite">
        <p class="result-label">Picked</p>
        <p id="result-name" class="result-name"></p>
      </div>

      <!-- Pick button -->
      <button id="btn-pick" class="btn-pick" type="button" disabled>
        Start Standup
      </button>

    </div>

    <!-- Celebration / complete state -->
    <div id="state-complete" class="state" hidden>
      <div class="confetti-container" aria-hidden="true">
        <span class="confetti-piece">🎉</span>
        <span class="confetti-piece">🎊</span>
        <span class="confetti-piece">✨</span>
        <span class="confetti-piece">🎉</span>
        <span class="confetti-piece">🎊</span>
        <span class="confetti-piece">✨</span>
      </div>
      <p class="complete-headline">Standup Complete!</p>
      <p class="complete-subtext">Everyone's had their turn. Ship it! 🚀</p>
      <ol id="picked-order-list" class="picked-order-list"></ol>
      <button id="btn-restart" class="btn-pick btn-restart" type="button">
        Start Over
      </button>
    </div>

  </div>

  <script src="popup.js"></script>
</body>
</html>
